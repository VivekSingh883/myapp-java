apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-java-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-java
  template:
    metadata:
      labels:
        app: myapp-java
    spec:
      containers:
      - name: myapp-java
        image: myapp-java:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080